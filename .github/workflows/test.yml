name: Test Telegram Bot

on:
  workflow_dispatch: # 수동 실행 버튼

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4 # 최신 버전으로 변경

      - name: 파이썬 설치
        uses: actions/setup-python@v5 # 최신 버전으로 변경
        with:
          python-version: '3.11'

      - name: 필요한 도구 설치
        run: pip install requests beautifulsoup4 # 크롤링 도구 추가 설치

      - name: 프로그램 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
