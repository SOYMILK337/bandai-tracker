name: bnkrmall-bot (Sub)

on:
  schedule:
    - cron: '*/30 * * * *' # 30분마다 본부 생존 확인
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      MY_GITHUB_PAT: ${{ secrets.MY_GITHUB_PAT }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PROXY_SECRET: ${{ secrets.PROXY_SECRET }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🚨 [비상 제어소] 본부 생존 여부 확인
      - name: Check Main HQ Status
        id: hq_check
        run: |
          CURRENT_TS=$(date +%s)
          # 깃허브 변수에서 마지막 하트비트 시간 가져오기
          LAST_HB=${{ vars.LAST_HEARTBEAT }}
          DIFF=$((CURRENT_TS - LAST_HB))
          
          echo "현재 시간: $CURRENT_TS"
          echo "본부 마지막 신호: $LAST_HB"
          echo "시간 차이: $DIFF 초"
          
          # 15분(900초) 이상 신호가 없으면 본부 다운으로 간주
          if [ $DIFF -lt 900 ]; then
            echo "본부 기지가 정상 가동 중입니다. 서브 봇을 가동하지 않습니다."
            echo "run_sub=false" >> $GITHUB_OUTPUT
          else
            echo "본부 침묵 감지! 비상 서브 엔진을 가동합니다."
            echo "run_sub=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.hq_check.outputs.run_sub == 'true'
        run: pip install requests beautifulsoup4

      - name: Run Sub Bot (V3.12)
        if: steps.hq_check.outputs.run_sub == 'true'
        run: python -u main.py # 깃허브에는 V3.12 코드가 들어있어야 함
